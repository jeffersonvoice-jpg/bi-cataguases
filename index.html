<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente BI — Cataguases</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F4F8;min-height:100vh;}
.header{background:#002B7F;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.logo-wrap{background:#fff;border-radius:7px;padding:5px 12px;display:flex;align-items:center;}
.logo-wrap img{height:34px;display:block;}
.header-title{color:#fff;text-align:right;}
.header-title h1{font-size:14px;font-weight:600;letter-spacing:0.02em;}
.header-title p{font-size:11px;opacity:0.65;margin-top:2px;}
.subbar{background:#0055B8;padding:8px 24px;display:flex;align-items:center;gap:8px;}
.subbar span{color:#fff;font-size:12px;opacity:0.9;}
.main{max-width:780px;margin:24px auto;padding:0 16px 40px;}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:16px;overflow:hidden;}
.card-head{padding:14px 18px;border-bottom:1px solid #E8EFF6;display:flex;align-items:center;gap:8px;}
.card-head h2{font-size:13px;font-weight:600;color:#002B7F;text-transform:uppercase;letter-spacing:0.05em;}
.card-body{padding:16px 18px;}
.status-bar{font-size:12px;padding:9px 13px;border-radius:6px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.status-bar.loading{background:#FFF8E1;color:#856404;border:1px solid #FFE082;}
.status-bar.ok{background:#E6F4EA;color:#1a7a3c;border:1px solid #A8D5B5;}
.status-bar.erro{background:#FDE8E8;color:#B91C1C;border:1px solid #F5B7B7;}
.spinner{width:14px;height:14px;border:2px solid #FFE082;border-top-color:#856404;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.search-row{display:flex;gap:8px;}
.search-row input{flex:1;border:1.5px solid #C8D8E8;border-radius:7px;padding:10px 14px;font-size:14px;color:#1a2e4a;outline:none;transition:border 0.15s;}
.search-row input:focus{border-color:#0055B8;box-shadow:0 0 0 3px rgba(0,85,184,0.1);}
.search-row input:disabled{background:#F5F5F5;color:#9DB2C8;}
.btn-search{background:#0055B8;color:#fff;border:none;border-radius:7px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:background 0.15s;}
.btn-search:hover{background:#002B7F;}
.btn-search:disabled{background:#9DB2C8;cursor:not-allowed;}
.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.sugg-pill{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid #C8D8E8;background:#F7FBFF;cursor:pointer;color:#4a6080;transition:all 0.15s;}
.sugg-pill:hover{background:#E0EFFA;border-color:#0055B8;color:#002B7F;}
.result-count{font-size:11px;color:#6B7E94;margin-bottom:10px;}
.group-card{border:1px solid #D8E8F4;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.group-head{background:#EBF5FC;padding:11px 15px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;border-bottom:1px solid #D8E8F4;}
.group-name{font-size:14px;font-weight:600;color:#002B7F;display:flex;align-items:center;gap:7px;}
.group-meta{font-size:11px;color:#4a6080;margin-top:3px;line-height:1.7;}
.group-meta b{color:#1a2e4a;font-weight:600;}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;}
.badge.ativo{background:#D4EDDA;color:#155724;}
.badge.inativo{background:#F8D7DA;color:#721C24;}
.badge.bloqueado{background:#FFF3CD;color:#856404;}
.razoes-label{font-size:10px;font-weight:700;color:#6B7E94;padding:6px 15px 3px;text-transform:uppercase;letter-spacing:0.07em;}
.razao-row{padding:9px 15px;border-top:1px solid #EEF3F8;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;}
.razao-nome{font-size:12px;font-weight:600;color:#1a2e4a;}
.razao-detail{font-size:11px;color:#6B7E94;margin-top:2px;line-height:1.6;}
.razao-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.not-found{background:#FDE8E8;border:1px solid #F5B7B7;border-radius:8px;padding:14px 16px;font-size:13px;color:#B91C1C;display:flex;align-items:center;gap:10px;}
.empty-state{text-align:center;padding:40px 0;color:#9DB2C8;}
.empty-state svg{width:44px;height:44px;margin:0 auto 10px;display:block;opacity:0.35;}
.empty-state p{font-size:13px;}
.footer{text-align:center;font-size:11px;color:#9DB2C8;padding:20px 0;}
@media(max-width:600px){
  .header{padding:10px 14px;}
  .logo-wrap img{height:28px;}
  .header-title h1{font-size:12px;}
  .main{padding:0 10px 30px;}
  .search-row{flex-direction:column;}
  .btn-search{justify-content:center;}
  .group-head{flex-direction:column;}
  .razao-row{grid-template-columns:1fr;}
  .razao-badges{flex-direction:row;margin-top:4px;}
}
</style>
</head>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Aguarde o carregamento e depois digite para consultar.</p>
    </div>
  </div>
</div>

<div class="footer">Assistente BI Comercial &mdash; Companhia Industrial Cataguases</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
var CLIENTES = [];

function norm(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}
function normCNPJ(s){ return (s||'').replace(/\D/g,''); }

function matchRow(r,q,qRaw){
  var cq=normCNPJ(qRaw), cr=normCNPJ(r.cnpj||'');
  if(cq.length>=8 && cr.includes(cq)) return true;
  return norm(r.grupo).includes(q)||norm(r.nome).includes(q)||norm(r.marca).includes(q);
}

function setStatus(tipo,msg){
  var bar=document.getElementById('statusBar');
  bar.className='status-bar '+tipo;
  var ic = tipo==='loading'
    ? '<div class="spinner"></div>'
    : tipo==='ok'
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  bar.innerHTML = ic+'<span>'+msg+'</span>';
}

function carregarDados(){
  setStatus('loading','Carregando base de clientes...');
  document.getElementById('searchInput').disabled=true;
  document.getElementById('btnBuscar').disabled=true;

  Papa.parse('https://docs.google.com/spreadsheets/d/174G8P2KMeqQ7NOUg5XBS4EQoqWb76KBoltU8ZifjdKE/export?format=csv&gid=359122000',{
    download:true, header:true, skipEmptyLines:true,
    complete:function(res){
      // Corrigir BOM
      var fields=res.meta.fields||[];
      if(fields[0]&&fields[0].charCodeAt(0)===0xFEFF){
        var fix=fields[0].substring(1);
        res.data.forEach(function(r){r[fix]=r[fields[0]];delete r[fields[0]];});
      }
      CLIENTES=res.data.map(function(r){
        return {
          cnpj:     (r['Número do Documento']||r['Numero do Documento']||'').trim(),
          nome:     (r['Nome da conta']||'').trim(),
          grupo:    (r['Grupo Econômico: Grupo Econômico']||r['Grupo Economico: Grupo Economico']||'').trim(),
          rep:      (r['Representante']||'').trim(),
          situacao: (r['Situação']||r['Situacao']||'').trim(),
          sitFin:   (r['Situação Financeira']||r['Situacao Financeira']||'').trim(),
          marca:    (r['Marca']||'').trim(),
          ramo:     (r['Ramo de Atividade']||'').trim(),
          segmento: (r['Segmento']||'').trim(),
          credVal:  (r['Limite de Crédito']||r['Limite de Credito']||'0').toString().replace(/\./g,'').replace(',','.'),
          credMoeda:(r['Limite de Crédito Moeda']||r['Limite de Credito Moeda']||'BRL').trim(),
          icms:     (r['ICMS']||'').toString().trim(),
          ret:      (r['RET']||'0').toString().trim(),
        };
      }).filter(function(r){ return r.situacao!=='Excluído'&&r.situacao!=='Excluido'; });

      var agora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setStatus('ok', CLIENTES.length.toLocaleString('pt-BR')+' razões sociais carregadas — atualizado às '+agora);
      document.getElementById('searchInput').disabled=false;
      document.getElementById('btnBuscar').disabled=false;
      document.getElementById('searchInput').focus();
    },
    error:function(e){
      setStatus('erro','Erro ao carregar dados. Verifique se a planilha está compartilhada como "Qualquer pessoa com o link" e recarregue a página.');
      console.error(e);
    }
  });
}

function onInput(){
  var raw=document.getElementById('searchInput').value;
  var q=norm(raw);
  var sd=document.getElementById('suggestions');
  if(q.length<2){sd.innerHTML='';return;}
  var seen={},suggs=[];
  for(var i=0;i<CLIENTES.length;i++){
    var r=CLIENTES[i];
    if(!matchRow(r,q,raw)) continue;
    var key=r.grupo||r.nome;
    if(!seen[key]){seen[key]=true;suggs.push(key);}
    if(suggs.length>=7) break;
  }
  sd.innerHTML=suggs.map(function(s){
    return '<button class="sugg-pill" onclick="selecionarSugestao('+JSON.stringify(s)+')">'+s+'</button>';
  }).join('');
}

function selecionarSugestao(v){
  document.getElementById('searchInput').value=v;
  document.getElementById('suggestions').innerHTML='';
  executarBusca(v);
}

function buscar(){
  var raw=document.getElementById('searchInput').value.trim();
  document.getElementById('suggestions').innerHTML='';
  executarBusca(raw);
}

function agrupar(rows){
  var map={},order=[];
  rows.forEach(function(r){
    var k=r.grupo||r.nome;
    if(!map[k]){map[k]=[];order.push(k);}
    map[k].push(r);
  });
  return {map:map,order:order};
}

function executarBusca(raw){
  var q=norm(raw);
  var div=document.getElementById('results');
  if(!q) return;

  var matches=CLIENTES.filter(function(r){return matchRow(r,q,raw);});
  if(!matches.length){
    div.innerHTML='<div class="not-found"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Nenhum cliente encontrado para esta busca.</div>';
    return;
  }

  var ag=agrupar(matches);
  var html='<div class="result-count">'+ag.order.length+' grupo(s) &mdash; '+matches.length+' razão(ões) social(is)</div>';

  ag.order.forEach(function(grupo){
    var razoes=ag.map[grupo];
    var temAt=razoes.some(function(r){return r.situacao==='Ativo';});
    var nAt=razoes.filter(function(r){return r.situacao==='Ativo';}).length;
    var statusG=temAt?'Ativo':'Inativo';
    var rep=razoes[0].rep||'—';
    var credTotal=razoes.reduce(function(s,r){return s+(parseFloat(r.credVal)||0);},0);
    var moeda=razoes[0].credMoeda||'BRL';
    var temBloq=razoes.some(function(r){return r.sitFin&&r.sitFin!=='Liberado';});
    var sitFinG=temBloq?'Bloqueado':'Liberado';

    html+='<div class="group-card">';
    html+='<div class="group-head"><div style="flex:1;min-width:0">';
    html+='<div class="group-name"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'+grupo+'</div>';
    html+='<div class="group-meta"><b>Representante:</b> '+rep+'<br>'+nAt+'/'+razoes.length+' razão(ões) ativa(s)&nbsp;·&nbsp;Financeiro: <b style="color:'+(temBloq?'#856404':'#155724')+'">'+sitFinG+'</b>'+(credTotal>0?'&nbsp;·&nbsp;Crédito: <b>'+moeda+' '+credTotal.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})+'</b>':'')+'</div>';
    html+='</div><span class="badge '+(statusG==='Ativo'?'ativo':'inativo')+'">'+statusG+'</span></div>';
    html+='<div class="razoes-label">Razões Sociais</div>';

    razoes.forEach(function(r){
      var isAt=r.situacao==='Ativo';
      var isBloq=r.sitFin&&r.sitFin!=='Liberado';
      var pts=[];
      if(r.cnpj) pts.push(r.cnpj);
      if(r.marca&&norm(r.marca)!==norm(r.nome)) pts.push('Marca: '+r.marca);
      if(r.ramo) pts.push(r.ramo);
      if(r.segmento) pts.push(r.segmento);
      if(r.icms) pts.push('ICMS '+r.icms+'%');
      if(r.ret==='1') pts.push('RET');
      var cred=parseFloat(r.credVal)||0;
      html+='<div class="razao-row"><div>';
      html+='<div class="razao-nome">'+r.nome+'</div>';
      html+='<div class="razao-detail">'+pts.join(' · ')+'</div>';
      if(cred>0) html+='<div class="razao-detail">Crédito: '+r.credMoeda+' '+cred.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})+'</div>';
      html+='</div><div class="razao-badges">';
      html+='<span class="badge '+(isAt?'ativo':'inativo')+'">'+r.situacao+'</span>';
      if(isBloq) html+='<span class="badge bloqueado">'+r.sitFin+'</span>';
      html+='</div></div>';
    });
    html+='</div>';
  });

  div.innerHTML=html;
}

window.onload=function(){carregarDados();};
</script>
</body>
</html>
